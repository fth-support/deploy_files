name: Build Deployment Tool EXE

on:
  push:
    branches:
      - main
  workflow_dispatch: 

jobs:
  build-windows-exe:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4  # <-- อัปเดตเป็น v4

    - name: Set up Python
      uses: actions/setup-python@v5 # <-- อัปเดตเป็น v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller openpyxl

    - name: Build with PyInstaller
      run: |
        pyinstaller --noconsole --onefile main.py

    - name: Upload Artifact
      uses: actions/upload-artifact@v4 # <-- แก้ไขตัวต้นเหตุเป็น v4
      with:
        name: DeploymentTool_Release
        path: dist/main.exe
