name: Build Deployment Tool EXE

on:
  push:
    branches:
      - main
  workflow_dispatch: # อนุญาตให้กดปุ่ม Build เองได้

jobs:
  build-windows-exe:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller openpyxl

    - name: Build with PyInstaller
      run: |
        # --noconsole เพื่อซ่อนหน้าต่าง cmd สีดำเวลารัน
        # --onefile เพื่อให้ได้ exe ไฟล์เดียวจบ
        pyinstaller --noconsole --onefile main.py

    - name: Upload Artifact
      uses: actions/upload-artifact@v3
      with:
        name: DeploymentTool_Release
        path: dist/main.exe
